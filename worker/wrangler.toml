name = "webui-xl"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[assets]
directory = "./static"
binding = "ASSETS"

[vars]
ENVIRONMENT = "development"
# Local dev: wrangler secret put SESSION_SECRET (or uses in-memory storage session key)

[triggers]
crons = ["*/5 * * * *"]

[dev]
port = 8787

# ---------------------------------------------------------------------------
# Staging — deploy: npx wrangler deploy --env staging
# ---------------------------------------------------------------------------
[env.staging]
name = "webui-xl-staging"
vars = { ENVIRONMENT = "staging" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webui-xl-staging"
database_id = "ac521479-9e08-416f-b92d-a39d41832edf"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "DATA"
bucket_name = "webui-xl-staging-data"

# [[env.staging.queues.producers]]
