{% extends "base.html" %}
{% block title %}{{ title or "Error" }}{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto bg-slate-900 border border-slate-800 rounded-lg p-6">
  <h1 class="text-2xl font-bold text-red-400 mb-2">{{ title or "Error" }}</h1>
  {% if message and ("\n" in message or "Traceback" in message) %}
  <pre class="text-xs text-slate-300 whitespace-pre-wrap bg-slate-950 p-3 rounded overflow-auto max-h-[60vh]">{{ message }}</pre>
  {% else %}
  <p class="text-slate-300">{{ message }}</p>
  {% endif %}
  <a href="/" class="inline-block mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded text-sm">Kembali</a>
</div>
{% endblock %}
